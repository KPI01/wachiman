services:
  app:
    build:
      context: .
    image: wachiman-app:latest
    container_name: wachiman-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: file:/data/wachiman.db
      UPLOADS_BASE_PATH: /uploads
      SESSION_COOKIE_SECURE: "false"
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - sqlite_data:/data
      - uploads_data:/uploads
      - ./branding:/app/public/branding:ro
    command: ["sh", "-c", "pnpm db:migrate && exec pnpm start"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
    name: wachiman_sqlite_data
  uploads_data:
    name: wachiman_uploads_data
